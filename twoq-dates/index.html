<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The World of Queen — Dates de tournée</title>
  
  <!-- Google Fonts : Cinzel (titres) + Montserrat (corps) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg: #000000;
      --bg-card: #0d0d0d;
      --bg-card-hover: #161616;
      --gold: #c9a84c;
      --gold-soft: rgba(201, 168, 76, 0.12);
      --gold-line: rgba(201, 168, 76, 0.3);
      --white: #ffffff;
      --gray: #888888;
      --gray-dark: #555555;
      --green: #22c55e;
      --red: #e24b4a;
      --amber: #ef9f27;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      padding: 24px 16px;
      line-height: 1.6;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* HEADER — bannière paysage pleine largeur */
    .header {
      text-align: center;
      margin-bottom: 32px;
      padding: 0;
    }
    .header-banner {
      width: 100%;
      max-width: 1100px;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 4px;
    }
    .header-divider {
      width: 120px;
      height: 1px;
      background: var(--gold);
      margin: 28px auto 0;
      opacity: 0.6;
    }

    /* FILTRES */
    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .filter-btn {
      background: transparent;
      color: var(--gray);
      border: 1px solid #2a2a2a;
      padding: 8px 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      border-radius: 2px;
    }
    .filter-btn:hover {
      color: var(--gold);
      border-color: var(--gold-line);
    }
    .filter-btn.active {
      background: var(--gold-soft);
      color: var(--gold);
      border-color: var(--gold);
    }

    /* GROUPE PAR ANNÉE */
    .year-group { margin-bottom: 36px; }
    .year-label {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gold-line);
    }

    /* DATE ROW */
    .date-row {
      display: grid;
      grid-template-columns: 95px 1fr auto;
      gap: 24px;
      align-items: center;
      background: var(--bg-card);
      padding: 18px 22px;
      border-radius: 8px;
      border-left: 3px solid var(--gold);
      margin-bottom: 10px;
      transition: all 0.3s ease;
      position: relative;
    }
    .date-row:hover {
      background: var(--bg-card-hover);
      transform: translateX(2px);
    }
    .date-row.passee {
      opacity: 0.65;
      border-left-color: var(--gray-dark);
    }
    .date-row.complet { border-left-color: var(--red); }
    .date-row.bientot { border-left-color: var(--gold); }
    .date-row.residence { border-left-color: var(--gold); }
    .date-row.annulee, .date-row.reportee { 
      opacity: 0.55;
      border-left-color: var(--gray-dark);
    }

    /* COLONNE DATE */
    .date-block { text-align: center; }
    .date-month {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 700;
      text-transform: uppercase;
    }
    .date-day {
      font-family: 'Cinzel', serif;
      font-size: 38px;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
      margin: 3px 0;
    }
    .date-year {
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 1px;
    }
    .date-dow {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--gray);
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 500;
    }

    /* COLONNE INFO */
    .info-block { min-width: 0; }
    .info-city {
      font-family: 'Cinzel', serif;
      font-size: 27px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
      line-height: 1.05;
    }
    .info-venue {
      font-size: 13px;
      color: #b8b8b8;
      font-weight: 500;
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }
    .info-time {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1.2px;
      font-weight: 600;
    }
    .info-tournee {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 8px;
      padding: 3px 10px;
      background: var(--gold-soft);
      border-radius: 2px;
    }
    .info-tournee.residence {
      color: #000;
      background: var(--gold);
      letter-spacing: 1.2px;
    }
    .info-tournee.nouveau {
      color: #000;
      background: var(--gold);
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    /* COLONNE ACTION — un seul bouton par date, format unifié */
    .action-block { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      align-items: stretch;
      min-width: 180px;
    }
    
    /* STYLE UNIFIÉ pour TOUS les boutons et badges — angles arrondis */
    .btn-billets,
    .status-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 22px;
      white-space: nowrap;
      box-sizing: border-box;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
    }

    /* RÉSERVER → fond OR, écriture NOIRE */
    .btn-billets {
      background: var(--gold);
      color: #000;
      border: 1px solid var(--gold);
    }
    .btn-billets:hover {
      background: #d4b35e;
      transform: translateY(-1px);
    }

    /* COMPLET → fond ROUGE, écriture BLANCHE, cadre BLANC */
    .status-badge.complet { 
      background: var(--red); 
      color: var(--white); 
      border: 1px solid var(--white);
    }

    /* BIENTÔT EN VENTE → fond NOIR, écriture OR, cadre OR */
    .status-badge.bientot { 
      background: #000; 
      color: var(--gold); 
      border: 1px solid var(--gold);
    }
    
    /* Petit texte "Ouverture le XX/XX/XXXX" sous le bouton Bientôt en vente */
    .ouverture-date {
      display: block;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--gold);
      opacity: 0.85;
      margin-top: 6px;
      text-transform: none;
    }

    /* ANNULÉE / REPORTÉE — gris discret, cadre gris */
    .status-badge.annulee, 
    .status-badge.reportee {
      background: transparent; 
      color: var(--gray);
      border: 1px solid var(--gray-dark);
    }

    /* TERMINÉ (date passée) — gris discret mais lisible */
    .status-badge.passee {
      background: transparent; 
      color: #999;
      border: 1px solid #555;
    }

    /* NO TICKETS (résidence) — fond NOIR, écriture OR, cadre OR */
    .status-badge.residence { 
      background: #000; 
      color: var(--gold); 
      border: 1px solid var(--gold);
    }

    /* MODAL BILLETTERIE — popup choix réseau */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      padding: 20px;
      animation: modalFadeIn 0.25s ease;
    }
    .modal-overlay.active { display: flex; }
    /* En contexte iframe : on force la position absolue calculée par JS */
    .modal-overlay.iframe-mode {
      position: absolute;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-box {
      background: #0d0d0d;
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 32px 28px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(201, 168, 76, 0.15);
      animation: modalSlideUp 0.3s ease;
    }
    @keyframes modalSlideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
    }
    .modal-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--white);
      text-align: center;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .modal-date {
      font-size: 12px;
      color: var(--gray);
      text-align: center;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid #1a1a1a;
    }
    .modal-networks {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-network-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: var(--white);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .modal-network-btn:hover {
      border-color: var(--gold);
      background: #1f1f1f;
      transform: translateX(2px);
    }
    .modal-network-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-network-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .modal-network-arrow {
      color: var(--gold);
      font-size: 18px;
      opacity: 0.6;
      transition: all 0.2s ease;
    }
    .modal-network-btn:hover .modal-network-arrow {
      opacity: 1;
      transform: translateX(3px);
    }
    .modal-close {
      display: block;
      margin: 24px auto 0;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid #2a2a2a;
      color: var(--gray);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .modal-close:hover {
      color: var(--white);
      border-color: var(--gray);
    }

    @media (max-width: 600px) {
      .modal-box { padding: 26px 22px; }
      .modal-title { font-size: 13px; letter-spacing: 2px; }
      .modal-subtitle { font-size: 16px; }
    }
    .state {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray);
    }
    .state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
    .state-text { font-size: 14px; letter-spacing: 1px; }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid #2a2a2a;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    .footer {
      text-align: center;
      padding-top: 40px;
      margin-top: 40px;
      border-top: 1px solid #1a1a1a;
      font-size: 10px;
      color: var(--gray-dark);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .footer a {
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 1.5px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      body { padding: 16px 12px; }
      .header-banner { max-width: 100% !important; }
      .date-row {
        grid-template-columns: 70px 1fr;
        gap: 12px;
        padding: 14px 14px;
      }
      .date-month { font-size: 10px; letter-spacing: 1.5px; }
      .date-day { font-size: 30px; }
      .date-year { font-size: 10px; }
      .date-dow { font-size: 8px; }
      .info-city { font-size: 19px; letter-spacing: 1.5px; }
      .info-venue { font-size: 12px; }
      .info-time { font-size: 11px; }
      .action-block {
        grid-column: 1 / -1;
        flex-direction: column;
        align-items: stretch;
        min-width: 0;
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #1a1a1a;
      }
      .btn-billets,
      .status-badge {
        height: 40px;
        font-size: 10px;
        letter-spacing: 1.8px;
        border-radius: 20px;
      }
      .filter-btn { font-size: 10px; padding: 6px 12px; letter-spacing: 1.5px; }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <img src="banniere.jpg?v=2" 
           alt="The World of Queen — L'Éternelle Légende" 
           class="header-banner"
           style="width: 100% !important; max-width: 1100px !important; height: auto !important; display: block !important; margin: 0 auto !important; border-radius: 4px !important;">
      <div class="header-divider"></div>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="avenir">À venir</button>
      <button class="filter-btn" data-filter="passees">Passées</button>
      <button class="filter-btn" data-filter="all">Toutes</button>
    </div>

    <div id="dates-container">
      <div class="state">
        <div class="spinner"></div>
        <div class="state-text">Chargement des dates...</div>
      </div>
    </div>

    <div class="footer">
      <div>The World of Queen — Production <a href="https://www.ohmyprod.com" target="_blank">Oh My Prod</a></div>
    </div>

  </div>

  <!-- MODAL BILLETTERIE — choix du réseau -->
  <div class="modal-overlay" id="modal-billetterie" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">Choisissez votre billetterie</div>
      <div class="modal-subtitle" id="modal-ville"></div>
      <div class="modal-date" id="modal-date-text"></div>
      <div class="modal-networks" id="modal-networks"></div>
      <button class="modal-close" onclick="fermerModal()">Fermer</button>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    // CONFIGURATION SUPABASE
    // ═══════════════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://nhxqcavianozskxgfcbt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_59Pg7368sxCT6y3j9nNw0g_i8ILGRZ3';
    
    // ⚠️ FIX : on renomme la variable locale en _sb pour éviter la collision
    // avec window.supabase (la lib elle-même expose un objet "supabase" global)
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });

    const MOIS_FR = ['JAN','FÉV','MAR','AVR','MAI','JUN','JUL','AOÛ','SEP','OCT','NOV','DÉC'];
    const JOURS_FR = ['DIM','LUN','MAR','MER','JEU','VEN','SAM'];

    let _allDates = [];
    let _currentFilter = 'avenir';

    // ═══════════════════════════════════════════════════════════════════
    // CHARGEMENT DES DATES PUBLIQUES
    // ═══════════════════════════════════════════════════════════════════
    async function chargerDates() {
      try {
        const { data, error } = await _sb
          .from('public_dates_twoq')
          .select('*')
          .order('date_concert', { ascending: true });
        
        if (error) {
          console.error('Erreur Supabase:', error);
          afficherErreur(error.message);
          return;
        }

        _allDates = data || [];
        appliquerFiltre();
      } catch (err) {
        console.error('Erreur:', err);
        afficherErreur('Impossible de charger les dates');
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    // FILTRES
    // ═══════════════════════════════════════════════════════════════════
    function appliquerFiltre() {
      const today = new Date(); today.setHours(0,0,0,0);
      let filtered = [..._allDates];

      switch (_currentFilter) {
        case 'avenir':
          filtered = filtered.filter(d => new Date(d.date_concert) >= today);
          break;
        case 'passees':
          filtered = filtered.filter(d => new Date(d.date_concert) < today)
            .sort((a,b) => new Date(b.date_concert) - new Date(a.date_concert));
          break;
      }

      afficherDates(filtered);
    }

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _currentFilter = btn.dataset.filter;
      appliquerFiltre();
    });

    // ═══════════════════════════════════════════════════════════════════
    // RENDU
    // ═══════════════════════════════════════════════════════════════════
    function afficherDates(dates) {
      const container = document.getElementById('dates-container');
      
      if (!dates || dates.length === 0) {
        container.innerHTML = `
          <div class="state">
            <div class="state-icon">🎭</div>
            <div class="state-text">Aucune date à afficher pour ce filtre</div>
          </div>`;
        return;
      }

      // Grouper par année
      const groupes = {};
      dates.forEach(d => {
        const annee = new Date(d.date_concert).getFullYear();
        if (!groupes[annee]) groupes[annee] = [];
        groupes[annee].push(d);
      });

      let html = '';
      const annees = Object.keys(groupes).sort((a,b) => 
        _currentFilter === 'passees' ? b - a : a - b
      );

      annees.forEach(annee => {
        html += `<div class="year-group">
          <div class="year-label">${annee}</div>`;
        groupes[annee].forEach(d => {
          html += rendreDate(d);
        });
        html += `</div>`;
      });

      container.innerHTML = html;
    }

    function rendreDate(d) {
      const dt = new Date(d.date_concert);
      const today = new Date(); today.setHours(0,0,0,0);
      const passee = dt < today;
      let statut = d.statut_public || 'en_vente';
      
      // 🎯 LOGIQUE INTELLIGENTE — date d'ouverture billetterie (DATE MEV)
      // Si DATE MEV est dans le futur, on FORCE le statut "bientot" 
      // (peu importe ce qui est en base) avec la date d'ouverture
      let mevFuture = false;
      if (d.date_open_mev) {
        const dateMev = new Date(d.date_open_mev);
        dateMev.setHours(0,0,0,0);
        if (dateMev > today) {
          mevFuture = true;
          statut = 'bientot'; // on force le statut bientôt en vente
        }
      }
      
      // Classes CSS selon statut
      let rowClass = passee ? 'passee' : '';
      let bouton = '';
      
      if (passee) {
        bouton = `<span class="status-badge passee">Terminé</span>`;
      } else if (statut === 'complet') {
        rowClass = 'complet';
        bouton = `<span class="status-badge complet">Complet</span>`;
      } else if (statut === 'annulee') {
        rowClass = 'annulee';
        bouton = `<span class="status-badge annulee">Annulée</span>`;
      } else if (statut === 'reportee') {
        rowClass = 'reportee';
        bouton = `<span class="status-badge reportee">Reportée</span>`;
      } else if (statut === 'bientot') {
        rowClass = 'bientot';
        // Bouton normal "Bientôt en vente" + date d'ouverture en petit en dessous si renseignée
        bouton = `<span class="status-badge bientot">Bientôt en vente</span>`;
        if (d.date_open_mev) {
          const dateOuv = formaterDateCourte(d.date_open_mev);
          bouton += `<span class="ouverture-date">Ouverture le ${dateOuv}</span>`;
        }
      } else if (statut === 'residence') {
        rowClass = 'residence';
        bouton = `<span class="status-badge residence">No Tickets</span>`;
      } else {
        // En vente OU dernières places → on affiche "Réserver"
        bouton = construireBoutonsBilletterie(d, statut);
      }

      const heure = d.heure_show ? d.heure_show.substring(0,5).replace(':', 'h') : '';
      const tourneeBadge = (statut === 'residence')
        ? `<span class="info-tournee residence">Résidence Nouveau Show</span>`
        : (d.nouveau_spectacle 
            ? `<span class="info-tournee nouveau">★ Nouveau spectacle ★</span>`
            : `<span class="info-tournee">${d.nom_tournee || ''}</span>`);

      return `
        <div class="date-row ${rowClass}">
          <div class="date-block">
            <div class="date-month">${MOIS_FR[dt.getMonth()]}</div>
            <div class="date-day">${String(dt.getDate()).padStart(2,'0')}</div>
            <div class="date-year">${dt.getFullYear()}</div>
            <div class="date-dow">${JOURS_FR[dt.getDay()]}</div>
          </div>
          <div class="info-block">
            <div class="info-city">${d.ville || ''}</div>
            <div class="info-venue">${d.nom_salle || ''}</div>
            ${heure ? `<div class="info-time">${heure}</div>` : ''}
            ${tourneeBadge}
          </div>
          <div class="action-block">
            ${bouton}
          </div>
        </div>`;
    }

    function construireBoutonsBilletterie(d, statut) {
      // Récupère tous les liens disponibles depuis liens_billetterie (jsonb) + lien_billetterie_principal
      const liens = collecterLiens(d);
      
      if (liens.length === 0) return '';
      
      // Si 1 seul lien → ouverture directe (pas de modal)
      if (liens.length === 1) {
        return `<a href="${liens[0].url}" target="_blank" rel="noopener" class="btn-billets">Réserver</a>`;
      }
      
      // Plusieurs liens → bouton qui ouvre le modal
      // On stocke les données dans un attribut data pour les récupérer au clic
      const dateStr = formaterDateLong(d.date_concert);
      const payload = encodeURIComponent(JSON.stringify({
        ville: d.ville || '',
        date: dateStr,
        liens: liens
      }));
      return `<button onclick="ouvrirModal('${payload}')" class="btn-billets">Réserver</button>`;
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // MODAL BILLETTERIE — gestion multi-réseaux
    // ═══════════════════════════════════════════════════════════════════
    
    // Mapping des réseaux connus (clé jsonb → nom affiché + couleur indicateur)
    const RESEAUX_MAPPING = {
      'ticketmaster':  { nom: 'Ticketmaster',         couleur: '#024b96' },
      'organisateur':  { nom: 'Organisateur',         couleur: '#c9a84c' },
      'ohmyprod_ldc':  { nom: 'Organisateur',         couleur: '#c9a84c' },
      'ohmyprod-ldc':  { nom: 'Organisateur',         couleur: '#c9a84c' },
      'ohmyprod':      { nom: 'Organisateur',         couleur: '#c9a84c' },
      'producteur':    { nom: 'Organisateur',         couleur: '#c9a84c' },
      'ldc':           { nom: 'Organisateur',         couleur: '#c9a84c' },
      'fnac':          { nom: 'Fnac Spectacles',      couleur: '#e1a925' },
      'digitick':      { nom: 'Digitick',             couleur: '#7e3ff2' },
      'seetickets':    { nom: 'See Tickets',          couleur: '#ed1c24' },
      'see_tickets':   { nom: 'See Tickets',          couleur: '#ed1c24' },
      'carrefour':     { nom: 'Carrefour Spectacles', couleur: '#0064d9' },
      'cultura':       { nom: 'Cultura',              couleur: '#00a651' },
      'salle':         { nom: 'Site de la salle',     couleur: '#c9a84c' },
      'dome':          { nom: 'Dôme de Paris',        couleur: '#c9a84c' },
      'zenith':        { nom: 'Zénith',               couleur: '#c9a84c' },
      'arena':         { nom: 'Arena',                couleur: '#c9a84c' }
    };
    
    // Ordre de priorité d'affichage dans le modal
    // Plus le poids est faible, plus le réseau apparaît en haut
    const ORDRE_RESEAUX = {
      'ticketmaster':  1,
      'organisateur':  2,
      'ohmyprod_ldc':  2,
      'ohmyprod-ldc':  2,
      'ohmyprod':      2,
      'producteur':    2,
      'ldc':           2,
      'fnac':          3,
      'digitick':      4,
      'seetickets':    5,
      'see_tickets':   5,
      'carrefour':     6,
      'cultura':       7,
      'salle':         8,
      'dome':          9,
      'zenith':        9,
      'arena':         9
    };
    
    function infosReseau(cle) {
      const k = (cle || '').toLowerCase().trim();
      if (RESEAUX_MAPPING[k]) {
        return { 
          ...RESEAUX_MAPPING[k], 
          ordre: ORDRE_RESEAUX[k] || 99 
        };
      }
      // Fallback : on capitalise la clé inconnue
      return { 
        nom: k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, ' '), 
        couleur: '#c9a84c',
        ordre: 99
      };
    }
    
    function collecterLiens(d) {
      const liens = [];
      const vus = new Set();
      
      // 1. D'abord les liens nommés dans liens_billetterie (jsonb)
      if (d.liens_billetterie && typeof d.liens_billetterie === 'object') {
        for (const [cle, url] of Object.entries(d.liens_billetterie)) {
          if (url && typeof url === 'string' && url.startsWith('http') && !vus.has(url)) {
            liens.push({ cle, url, ...infosReseau(cle) });
            vus.add(url);
          }
        }
      }
      
      // 2. Le lien principal s'il n'est pas déjà inclus
      if (d.lien_billetterie_principal && d.lien_billetterie_principal.startsWith('http') 
          && !vus.has(d.lien_billetterie_principal)) {
        // Si le principal est un lien Ticketmaster, on le tague comme tel
        const cleDeduite = d.lien_billetterie_principal.includes('ticketmaster.fr') 
          ? 'ticketmaster' 
          : 'organisateur';
        liens.push({ 
          cle: cleDeduite, 
          url: d.lien_billetterie_principal, 
          ...infosReseau(cleDeduite)
        });
      }
      
      // 3. TRI par ordre de priorité (Ticketmaster > Organisateur > Fnac > reste)
      liens.sort((a, b) => a.ordre - b.ordre);
      
      return liens;
    }
    
    function formaterDateCourte(dateStr) {
      if (!dateStr) return '';
      const dt = new Date(dateStr);
      const jour = String(dt.getDate()).padStart(2, '0');
      const mois = String(dt.getMonth() + 1).padStart(2, '0');
      const annee = dt.getFullYear();
      return `${jour}/${mois}/${annee}`;
    }
    
    function formaterDateLong(dateStr) {
      const dt = new Date(dateStr);
      const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
      const mois = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      return `${jours[dt.getDay()]} ${dt.getDate()} ${mois[dt.getMonth()]} ${dt.getFullYear()}`;
    }
    
    function ouvrirModal(payloadEncode) {
      try {
        const data = JSON.parse(decodeURIComponent(payloadEncode));
        
        // 🎯 SI ON EST EN IFRAME (Wix theworldofqueen.com) : 
        // on ouvre une VRAIE fenêtre popup native du navigateur, plus simple et fiable
        if (window.parent !== window) {
          ouvrirPopupNatif(data);
          return;
        }
        
        // Sinon (mode standalone sur app.ohmyprod.com), modal classique
        document.getElementById('modal-ville').textContent = data.ville;
        document.getElementById('modal-date-text').textContent = data.date;
        
        const container = document.getElementById('modal-networks');
        container.innerHTML = data.liens.map(l => `
          <a href="${l.url}" target="_blank" rel="noopener" class="modal-network-btn" onclick="fermerModal()">
            <span class="modal-network-name">
              <span class="modal-network-icon" style="background:${l.couleur}"></span>
              ${l.nom}
            </span>
            <span class="modal-network-arrow">→</span>
          </a>
        `).join('');
        
        document.getElementById('modal-billetterie').classList.add('active');
        document.body.style.overflow = 'hidden';
      } catch (e) {
        console.error('Erreur ouverture modal:', e);
      }
    }
    
    // Popup natif HTML autonome — ouvert via window.open dans une vraie fenêtre
    function ouvrirPopupNatif(data) {
      const liensHtml = data.liens.map(l => `
        <a href="${l.url}" target="_blank" rel="noopener" class="btn-reseau" onclick="window.close()">
          <span class="dot" style="background:${l.couleur}"></span>
          <span class="nom">${l.nom}</span>
          <span class="fleche">→</span>
        </a>
      `).join('');
      
      const html = `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Choisir billetterie - ${data.ville}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    padding: 30px 24px;
    line-height: 1.6;
  }
  .titre {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: #c9a84c;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 10px;
  }
  .ville {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: #fff;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .date {
    font-size: 12px;
    color: #888;
    text-align: center;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid #1a1a1a;
  }
  .reseaux { display: flex; flex-direction: column; gap: 10px; }
  .btn-reseau {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.2s ease;
  }
  .btn-reseau:hover {
    border-color: #c9a84c;
    background: #1f1f1f;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nom { flex: 1; }
  .fleche { color: #c9a84c; font-size: 18px; opacity: 0.7; }
  .fermer {
    display: block;
    margin: 20px auto 0;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #888;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 20px;
    cursor: pointer;
  }
  .fermer:hover { color: #fff; border-color: #888; }
</style>
</head>
<body>
  <div class="titre">Choisissez votre billetterie</div>
  <div class="ville">${data.ville}</div>
  <div class="date">${data.date}</div>
  <div class="reseaux">${liensHtml}</div>
  <button class="fermer" onclick="window.close()">Fermer</button>
</body>
</html>`;
      
      // Ouvrir une nouvelle fenêtre popup
      const popup = window.open('', '_blank', 
        'width=480,height=600,resizable=yes,scrollbars=yes,status=no,toolbar=no,menubar=no,location=no');
      
      if (!popup) {
        // Si bloqué par bloqueur de popup, fallback : on ouvre directement le 1er lien
        if (data.liens.length > 0) {
          window.open(data.liens[0].url, '_blank', 'noopener');
        }
        return;
      }
      
      popup.document.write(html);
      popup.document.close();
      popup.focus();
    }
    
    // Fermeture du modal au clic en dehors ou sur Échap
    document.getElementById('modal-billetterie').addEventListener('click', e => {
      if (e.target.id === 'modal-billetterie') fermerModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') fermerModal();
    });

    function afficherErreur(msg) {
      document.getElementById('dates-container').innerHTML = `
        <div class="state">
          <div class="state-icon">⚠️</div>
          <div class="state-text">Erreur de chargement<br><small style="color:var(--gray-dark)">${msg}</small></div>
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════
    chargerDates();

    // Auto-refresh toutes les 5 minutes (au cas où des dates changent)
    setInterval(chargerDates, 5 * 60 * 1000);
    
    // ═══════════════════════════════════════════════════════════════════
    // AUTO-RESIZE quand utilisé en iframe (intégration Wix theworldofqueen.com)
    // Envoie la hauteur du contenu au parent pour qu'il ajuste l'iframe
    // ═══════════════════════════════════════════════════════════════════
    function envoyerHauteur() {
      try {
        const hauteur = Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight,
          document.body.offsetHeight,
          document.documentElement.offsetHeight
        );
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ 
            type: 'twoq-widget-resize', 
            hauteur: hauteur 
          }, '*');
        }
      } catch(e) { /* silencieux */ }
    }
    
    // Envoyer la hauteur après chaque rendu et au resize
    new ResizeObserver(envoyerHauteur).observe(document.body);
    window.addEventListener('load', envoyerHauteur);
    setTimeout(envoyerHauteur, 500);
    setTimeout(envoyerHauteur, 1500);
    setTimeout(envoyerHauteur, 3000);
  </script>
</body>
</html>
